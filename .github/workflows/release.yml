name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate checksum
        run: sha256sum tmuxload > tmuxload.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tmuxload
            tmuxload.sha256
          generate_release_notes: true
